name: "Build .NET app"
description: "Builds and publishes the ASP.NET Core app"
runs:
  using: "composite"
  steps:
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: "10.x"

    - name: Restore dependencies
      shell: pwsh
      run: dotnet restore ${{ github.workspace }}/src/todo.api/todo.api.csproj

    - name: Build project
      shell: pwsh
      run: dotnet build ${{ github.workspace }}/src/todo.api/todo.api.csproj --configuration Release --no-restore

    - name: Publish project
      shell: pwsh
      run: dotnet publish ${{ github.workspace }}/src/todo.api/todo.api.csproj -c Release -o "${{ runner.temp }}/myapp" --no-build

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: .net-app
        path: ${{ runner.temp }}/myapp
