name: "Build .NET app"
description: "Builds and publishes the ASP.NET Core app"
runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v4

    - name: Set up .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: "10.x"

    - name: Build with dotnet
      shell: bash
      run: dotnet build ${{ github.action_path }}/../../../src/todo.api/todo.api.csproj --configuration Release

    - name: dotnet publish
      shell: bash
      run: dotnet publish ${{ github.action_path }}/../../../src/todo.api/todo.api.csproj -c Release -o "${{ runner.temp }}/myapp"

    - name: Upload artifact for deployment job
      uses: actions/upload-artifact@v4
      with:
        name: .net-app
        path: ${{ runner.temp }}/myapp
